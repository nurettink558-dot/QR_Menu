<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dijital QR Menü</title>
    
    <!-- Google Fonts: Outfit for modern, geometric look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config for Custom Colors and Fonts -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            200: '#eaddd7',
                            300: '#e0cec7',
                            400: '#d2bab0',
                            500: '#a37c6d',
                            600: '#8c6b5d',
                            700: '#695046',
                            800: '#4a3831',
                            900: '#2b211d',
                        },
                        dark: {
                            bg: '#0f1115',
                            card: '#181b21',
                            border: '#2a2e37'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'scale-in': 'scaleIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-dark-bg dark:text-gray-100 transition-colors duration-300 antialiased selection:bg-brand-500 selection:text-white">

    <!-- Header area with premium gradient/glassmorphism backdrop -->
    <header class="relative overflow-hidden bg-white dark:bg-dark-card border-b border-gray-100 dark:border-dark-border z-20">
        <!-- Abstract gradient blobs -->
        <div class="absolute top-[-50%] left-[-10%] w-[150%] h-[200%] bg-gradient-to-br from-brand-100/40 via-transparent to-transparent dark:from-brand-900/20 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="relative container mx-auto px-4 py-6 md:py-8 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 id="restaurant-name" class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400">
                    <!-- Loaded via JS -->
                </h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium mt-1"><i class="fa-solid fa-utensils mr-2"></i>Dijital Menü</p>
            </div>
            
            <button id="theme-toggle" class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all focus:outline-none focus:ring-2 focus:ring-brand-500 glass-effect">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:block text-lg text-yellow-400"></i>
            </button>
        </div>
    </header>

    <!-- Sticky Categories Navigation -->
    <nav class="sticky top-0 z-30 bg-white/80 dark:bg-dark-card/80 backdrop-blur-md border-b border-gray-100 dark:border-dark-border shadow-sm">
        <div class="container mx-auto px-4">
            <div id="category-container" class="flex overflow-x-auto hide-scrollbar py-3 space-x-2 snap-x snap-mandatory">
                <!-- Categories loaded via JS -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 mb-20 min-h-[60vh]">
        <!-- Search and Filter (Optional premium touch) -->
        <div class="relative mb-8 animate-fade-in group w-full max-w-md mx-auto">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fa-solid fa-search text-gray-400 group-focus-within:text-brand-500 transition-colors"></i>
            </div>
            <input type="text" id="search-input" class="w-full bg-white dark:bg-dark-card border border-gray-200 dark:border-dark-border text-gray-900 dark:text-white text-sm rounded-2xl focus:ring-2 focus:ring-brand-500 focus:border-transparent block pl-10 p-3.5 transition-all shadow-sm" placeholder="Yemek veya içecek ara...">
        </div>

        <!-- Menu Items Grid -->
        <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading Skeletons -->
            <div class="menu-skeleton bg-white dark:bg-dark-card rounded-3xl p-4 shadow-sm border border-gray-100 dark:border-dark-border animate-pulse">
                <div class="w-full h-48 bg-gray-200 dark:bg-gray-700 rounded-2xl mb-4"></div>
                <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-full mb-2"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-5/6 mb-4"></div>
                <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-1/4 mt-auto"></div>
            </div>
            <div class="menu-skeleton hidden md:block bg-white dark:bg-dark-card rounded-3xl p-4 shadow-sm border border-gray-100 dark:border-dark-border animate-pulse">
                <div class="w-full h-48 bg-gray-200 dark:bg-gray-700 rounded-2xl mb-4"></div>
                <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-full mb-4"></div>
                <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-1/4 mt-auto"></div>
            </div>
             <div class="menu-skeleton hidden lg:block bg-white dark:bg-dark-card rounded-3xl p-4 shadow-sm border border-gray-100 dark:border-dark-border animate-pulse">
                <div class="w-full h-48 bg-gray-200 dark:bg-gray-700 rounded-2xl mb-4"></div>
                <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-full mb-4"></div>
                <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-1/4 mt-auto"></div>
            </div>
            <!-- Actual items loaded via JS -->
        </div>

        <!-- No Results Fallback -->
        <div id="no-results" class="hidden flex-col items-center justify-center py-16 text-center animate-fade-in">
            <div class="w-24 h-24 mb-4 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-400 dark:text-gray-500">
                <i class="fa-solid fa-plate-wheat text-4xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 dark:text-gray-200 mb-2">Sonuç bulunamadı</h3>
            <p class="text-gray-500 dark:text-gray-400">Aramanıza uygun ürün bulunmuyor. Lütfen başka bir kelime deneyin.</p>
        </div>
    </main>

    <!-- Product Detail Modal Backdrop & Container -->
    <div id="product-modal" class="fixed inset-0 z-50 flex items-end justify-center sm:items-center sm:p-0 pointer-events-none opacity-0 transition-opacity duration-300">
        <!-- Backdrop overlay -->
        <div id="modal-backdrop" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity"></div>
        
        <!-- Modal Panel -->
        <div id="modal-panel" class="relative bg-white dark:bg-dark-card sm:rounded-3xl rounded-t-3xl w-full sm:max-w-lg max-h-[90vh] flex flex-col pointer-events-auto transform translate-y-full sm:translate-y-4 sm:scale-95 transition-all duration-400 ease-[cubic-bezier(0.16,1,0.3,1)] shadow-2xl">
            <!-- Modal Handle for mobile -->
            <div class="absolute top-0 left-0 right-0 h-6 flex justify-center items-center sm:hidden z-10" id="modal-handle">
                <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
            </div>
            
            <!-- Close Button -->
            <button id="close-modal" class="absolute top-4 right-4 z-20 w-8 h-8 flex items-center justify-center rounded-full bg-black/20 text-white hover:bg-black/40 backdrop-blur-md transition-colors focus:outline-none">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <!-- Modal Content (Scrollable) -->
            <div class="overflow-y-auto hide-scrollbar sm:rounded-3xl rounded-t-3xl flex-1 pb-6" id="modal-content-container">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white dark:bg-dark-card border-t border-gray-100 dark:border-dark-border py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">
                &copy; <span id="current-year"></span> Dijital QR Menü. Tüm hakları saklıdır. <br>
                <i class="fa-solid fa-heart text-red-500 mt-2"></i> ile tasarlandı.
            </p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
